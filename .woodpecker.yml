clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      recursive: false

when:
  - event: push
    branch: [main, master]
  - event: manual

steps:
  workflow-smoke:
    image: alpine:3.20
    commands:
      - echo "woodpecker build for $CI_EVENT on $CI_COMMIT_BRANCH"
    when:
      - event: push
        branch: [main, master]
      - event: manual

  sync-submodules:
    image: alpine/git:2.49.1
    depends_on:
      - workflow-smoke
    commands:
      - git submodule sync
      - git submodule update --init --recursive
    when:
      - path:
          - ".gitmodules"
          - ".woodpecker.yml"
          - "Dockerfile.utils-cpu"
          - "Dockerfile.utils-cpu-warm"
          - "Dockerfile.utils-gpu"
          - "Dockerfile.utils-gpu-warm"
          - "Makefile"
          - "pyproject.toml"
          - "requirements/**"
          - "scripts/**"
          - "tests/**"
          - "third_party/**"
      - event: manual

  stage-ffmpeg-onnx-assets:
    image: alpine:3.20
    depends_on:
      - sync-submodules
    commands:
      - apk add --no-cache curl
      - mkdir -p third_party/ffmpeg-onnx/models
      - curl -L https://github.com/treehorn-dev/ffmpeg-onnx/releases/download/nudenet-assets-v1/nudenet.onnx -o third_party/ffmpeg-onnx/models/nudenet.onnx
      - curl -L https://github.com/treehorn-dev/ffmpeg-onnx/releases/download/nudenet-assets-v1/labels.txt -o third_party/ffmpeg-onnx/models/labels.txt
    when:
      - path:
          - ".gitmodules"
          - ".woodpecker.yml"
          - "Dockerfile.utils-cpu"
          - "Dockerfile.utils-cpu-warm"
          - "third_party/ffmpeg-onnx/**"
          - "Makefile"
          - "requirements/**"
          - "scripts/**"
          - "tests/**"
      - event: manual

  publish-ffmpeg-onnx-base:
    image: woodpeckerci/plugin-kaniko
    depends_on:
      - stage-ffmpeg-onnx-assets
    settings:
      repo: ghcr.io/treehorn-dev/ffmpeg-onnx
      registry: ghcr.io
      context: third_party/ffmpeg-onnx
      dockerfile: third_party/ffmpeg-onnx/Dockerfile
      username:
        from_secret: treehorn-dev_ghcr_username
      password:
        from_secret: treehorn-dev_ghcr_token
      tags:
        - base
        - base-latest
    when:
      - path:
          - ".gitmodules"
          - ".woodpecker.yml"
          - "Dockerfile.utils-cpu"
          - "Dockerfile.utils-cpu-warm"
          - "third_party/ffmpeg-onnx/**"
          - "Makefile"
          - "requirements/**"
          - "scripts/**"
          - "tests/**"
      - event: manual

  publish-ffmpeg-onnx-baked:
    image: woodpeckerci/plugin-kaniko
    depends_on:
      - publish-ffmpeg-onnx-base
    settings:
      repo: ghcr.io/treehorn-dev/ffmpeg-onnx
      registry: ghcr.io
      context: third_party/ffmpeg-onnx
      dockerfile: third_party/ffmpeg-onnx/Dockerfile.baked
      username:
        from_secret: treehorn-dev_ghcr_username
      password:
        from_secret: treehorn-dev_ghcr_token
      tags:
        - baked
        - baked-latest
      build_args:
        - FFMPEG_ONNX_BASE_IMAGE=ghcr.io/treehorn-dev/ffmpeg-onnx:base
    when:
      - path:
          - ".gitmodules"
          - ".woodpecker.yml"
          - "Dockerfile.utils-cpu"
          - "Dockerfile.utils-cpu-warm"
          - "third_party/ffmpeg-onnx/**"
          - "Makefile"
          - "requirements/**"
          - "scripts/**"
          - "tests/**"
      - event: manual

  publish-cpu:
    image: woodpeckerci/plugin-kaniko
    depends_on:
      - publish-ffmpeg-onnx-baked
    settings:
      repo: ghcr.io/treehorn-dev/avtools-utils
      registry: ghcr.io
      context: .
      dockerfile: Dockerfile.utils-cpu
      username:
        from_secret: treehorn-dev_ghcr_username
      password:
        from_secret: treehorn-dev_ghcr_token
      tags:
        - cpu
        - cpu-latest
      build_args:
        - FFMPEG_ONNX_BASE_IMAGE=ghcr.io/treehorn-dev/ffmpeg-onnx:baked
        - BAKE_WD14_ASSETS=0
        - WARM_MODELS=0
    when:
      - path:
          - ".gitmodules"
          - ".woodpecker.yml"
          - "Dockerfile.utils-cpu"
          - "Dockerfile.utils-cpu-warm"
          - "Makefile"
          - "pyproject.toml"
          - "requirements/**"
          - "scripts/**"
          - "tests/**"
          - "third_party/**"
      - event: manual

  publish-cpu-warm:
    image: woodpeckerci/plugin-kaniko
    depends_on:
      - publish-cpu
    settings:
      repo: ghcr.io/treehorn-dev/avtools-utils
      registry: ghcr.io
      context: .
      dockerfile: Dockerfile.utils-cpu-warm
      username:
        from_secret: treehorn-dev_ghcr_username
      password:
        from_secret: treehorn-dev_ghcr_token
      tags:
        - cpu-warm
        - cpu-warm-latest
      build_args:
        - AVTOOLS_BASE_IMAGE=ghcr.io/treehorn-dev/avtools-utils:cpu
        - BAKE_WD14_ASSETS=1
        - WARM_MODELS=1
    when:
      - path:
          - ".gitmodules"
          - ".woodpecker.yml"
          - "Dockerfile.utils-cpu"
          - "Dockerfile.utils-cpu-warm"
          - "Makefile"
          - "pyproject.toml"
          - "requirements/**"
          - "scripts/**"
          - "tests/**"
          - "third_party/**"
      - event: manual

  publish-gpu:
    image: woodpeckerci/plugin-kaniko
    depends_on:
      - publish-ffmpeg-onnx-baked
    settings:
      repo: ghcr.io/treehorn-dev/avtools-utils
      registry: ghcr.io
      context: .
      dockerfile: Dockerfile.utils-gpu
      username:
        from_secret: treehorn-dev_ghcr_username
      password:
        from_secret: treehorn-dev_ghcr_token
      tags:
        - gpu
        - gpu-latest
      build_args:
        - BAKE_WD14_ASSETS=0
        - WARM_MODELS=0
    when:
      - event: manual

  publish-gpu-warm:
    image: woodpeckerci/plugin-kaniko
    depends_on:
      - publish-gpu
    settings:
      repo: ghcr.io/treehorn-dev/avtools-utils
      registry: ghcr.io
      context: .
      dockerfile: Dockerfile.utils-gpu-warm
      username:
        from_secret: treehorn-dev_ghcr_username
      password:
        from_secret: treehorn-dev_ghcr_token
      tags:
        - gpu-warm
        - gpu-warm-latest
      build_args:
        - AVTOOLS_BASE_IMAGE=ghcr.io/treehorn-dev/avtools-utils:gpu
        - BAKE_WD14_ASSETS=1
        - WARM_MODELS=1
    when:
      - event: manual
